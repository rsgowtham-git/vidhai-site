<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Admin - Vidhai</title>
    <link rel="stylesheet" href="/base.css">
    <link rel="stylesheet" href="/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .admin-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--color-text);
        }
        
        .admin-header p {
            color: var(--color-text-secondary);
            font-size: 1.1rem;
        }
        
        .control-panel {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .control-row {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .control-row:last-child {
            margin-bottom: 0;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            background: var(--color-bg-secondary);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--color-border);
        }
        
        .stat-card h3 {
            margin: 0 0 8px 0;
            font-size: 0.9rem;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-card .value {
            font-size: 2rem;
            font-weight: 600;
            color: var(--color-primary);
        }
        
        .preview-section {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .preview-section h2 {
            margin: 0 0 20px 0;
            color: var(--color-text);
        }
        
        .preview-iframe-container {
            border: 2px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
            background: #f9fafb;
            min-height: 600px;
        }
        
        .preview-iframe {
            width: 100%;
            min-height: 600px;
            border: none;
        }
        
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: var(--color-primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--color-primary-hover);
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .btn-secondary {
            background: var(--color-secondary);
            color: var(--color-text);
        }
        
        .btn-secondary:hover {
            background: var(--color-secondary-hover);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .form-control {
            padding: 10px 15px;
            border: 1px solid var(--color-border);
            border-radius: 6px;
            font-size: 1rem;
            background: var(--color-surface);
            color: var(--color-text);
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }
        
        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        
        .alert-info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1>📧 Newsletter Admin</h1>
            <p>Generate, preview, and send automated newsletters to your subscribers</p>
        </div>

        <!-- Control Panel -->
        <div class="control-panel">
            <h2 style="margin: 0 0 20px 0;">Newsletter Controls</h2>
            
            <!-- Stats -->
            <div class="stats">
                <div class="stat-card">
                    <h3>Active Subscribers</h3>
                    <div class="value" id="subscriberCount">-</div>
                </div>
                <div class="stat-card">
                    <h3>Posts in Newsletter</h3>
                    <div class="value" id="postCount">-</div>
                </div>
                <div class="stat-card">
                    <h3>Newsletter Status</h3>
                    <div class="value" style="font-size: 1.2rem;" id="status">Ready</div>
                </div>
            </div>

            <!-- Actions -->
            <div class="control-row">
                <select id="frequencySelect" class="form-control">
                    <option value="weekly">Weekly Newsletter</option>
                    <option value="monthly">Monthly Newsletter</option>
                    <option value="special">Special Edition</option>
                </select>
                
                <button class="btn btn-primary" id="generateBtn" onclick="generateDraft()">
                    <span>⚡</span> Generate Draft
                </button>
                
                <button class="btn btn-secondary" id="refreshBtn" onclick="refreshPreview()" disabled>
                    <span>🔄</span> Refresh Preview
                </button>
                
                <button class="btn btn-success" id="sendBtn" onclick="sendNewsletter()" disabled>
                    <span>🚀</span> Approve & Send
                </button>
            </div>

            <!-- Status Messages -->
            <div id="statusMessages"></div>
        </div>

        <!-- Preview Section -->
        <div class="preview-section" id="previewSection" style="display: none;">
            <h2>👀 Newsletter Preview</h2>
            <div style="margin-bottom: 15px;">
                <strong>Subject:</strong> <span id="emailSubject" style="color: var(--color-text-secondary);">-</span>
            </div>
            <div class="preview-iframe-container">
                <iframe id="previewFrame" class="preview-iframe" title="Newsletter Preview"></iframe>
            </div>
        </div>
    </div>

    <script>
        let currentDraft = null;

        // On page load, fetch subscriber count
        async function init() {
            try {
                const response = await fetch('/api/subscribers?action=count');
                const data = await response.json();
                if (data.count !== undefined) {
                    document.getElementById('subscriberCount').textContent = data.count;
                }
            } catch (err) {
                console.error('Failed to fetch subscriber count:', err);
            }
        }

        async function generateDraft() {
            const generateBtn = document.getElementById('generateBtn');
            const statusMessages = document.getElementById('statusMessages');
            const frequency = document.getElementById('frequencySelect').value;
            
            generateBtn.disabled = true;
            generateBtn.innerHTML = '<span class="loading"></span> Generating...';
            statusMessages.innerHTML = '<div class="alert alert-info">Generating newsletter draft from latest posts...</div>';

            try {
                const response = await fetch(`/api/newsletter-draft?frequency=${frequency}`);
                const data = await response.json();

                if (data.success) {
                    currentDraft = data;
                    
                    // Update stats
                    document.getElementById('postCount').textContent = data.postCount;
                    document.getElementById('subscriberCount').textContent = data.subscriberCount;
                    document.getElementById('status').textContent = 'Draft Ready';
                    
                    // Update subject
                    document.getElementById('emailSubject').textContent = data.subject;
                    
                    // Show preview
                    const previewFrame = document.getElementById('previewFrame');
                    const previewSection = document.getElementById('previewSection');
                    previewFrame.srcdoc = data.htmlContent;
                    previewSection.style.display = 'block';
                    
                    // Enable buttons
                    document.getElementById('refreshBtn').disabled = false;
                    document.getElementById('sendBtn').disabled = false;
                    
                    statusMessages.innerHTML = `<div class="alert alert-success">✅ Newsletter draft generated! Preview below and click "Approve & Send" when ready.</div>`;
                } else {
                    throw new Error(data.error || 'Failed to generate draft');
                }
            } catch (err) {
                statusMessages.innerHTML = `<div class="alert alert-error">❌ Error: ${err.message}</div>`;
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<span>⚡</span> Generate Draft';
            }
        }

        async function refreshPreview() {
            if (currentDraft) {
                const previewFrame = document.getElementById('previewFrame');
                previewFrame.srcdoc = currentDraft.htmlContent;
            }
        }

        async function sendNewsletter() {
            if (!currentDraft) {
                alert('Please generate a draft first!');
                return;
            }

            const confirmed = confirm(
                `You are about to send this newsletter to ${currentDraft.subscriberCount} subscribers.\n\n` +
                `Subject: ${currentDraft.subject}\n\n` +
                `Are you sure you want to proceed?`
            );

            if (!confirmed) return;

            const sendBtn = document.getElementById('sendBtn');
            const statusMessages = document.getElementById('statusMessages');
            
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="loading"></span> Sending...';
            statusMessages.innerHTML = '<div class="alert alert-info">🚀 Sending newsletter to all subscribers...</div>';

            try {
                const response = await fetch('/api/newsletter-send', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        subject: currentDraft.subject,
                        htmlContent: currentDraft.htmlContent,
                        frequency: currentDraft.frequency
                    })
                });

                const data = await response.json();

                if (data.success) {
                    statusMessages.innerHTML = `<div class="alert alert-success">🎉 ${data.message}</div>`;
                    document.getElementById('status').textContent = 'Sent!';
                    
                    // Reset after 3 seconds
                    setTimeout(() => {
                        currentDraft = null;
                        document.getElementById('previewSection').style.display = 'none';
                        document.getElementById('refreshBtn').disabled = true;
                        document.getElementById('sendBtn').disabled = true;
                        document.getElementById('status').textContent = 'Ready';
                        statusMessages.innerHTML = '';
                    }, 3000);
                } else {
                    throw new Error(data.error || 'Failed to send newsletter');
                }
            } catch (err) {
                statusMessages.innerHTML = `<div class="alert alert-error">❌ Error: ${err.message}</div>`;
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '<span>🚀</span> Approve & Send';
            }
        }

        // Initialize on load
        init();
    </script>
</body>
</html>
